- defaults:
    link:
        relink: true
        create: true

- create: ["~/.ssh"]

- clean: ['~', '~/.ssh']

- link:
    ~/.dotfiles.local: "" # symlink a fixed path for all local dotfiles

    # ssh config
    ~/.ssh/config.local: ssh/config.local

    # git config
    ~/.gitconfig.local:

    ~/.zshrc.local:

# Sets default config for brew directives
- defaults:
    brewfile:
        stdout: true
    brew:
        stderr: false
        stdout: false

# Installs Homebrew if missing
- install-brew: true

# Reads Brewfile for packages to install
- brewfile:
    - Brewfile

- shell:
    -
        command: sudo ./install -p dotbot-apt/apt.py -c packages.config.yaml
        description: Installing Linux system packages via apt
        stdout: true
        stderr: true
    - [sudo chsh -s $(which zsh) $(whoami), Setting zsh as the default shell]
